name: Update Homebrew Tap

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to publish to tap (defaults to latest release tag)"
        required: false
        type: string
      build_bottles:
        description: "Build and publish Homebrew bottles"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: homebrew-tap-${{ github.workflow }}-${{ github.ref }}-${{ inputs.release_tag || github.event.release.tag_name || 'none' }}
  cancel-in-progress: true

jobs:
  update-tap:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event.release.prerelease == false && github.event.release.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      tap_repo: ${{ steps.tap.outputs.tap_repo }}
      bottle_release_tag: ${{ steps.meta.outputs.bottle_release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
            if [[ -z "${tag}" ]]; then
              tag="$(curl -fsSL "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest" | jq -r '.tag_name')"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.release.tag_name }}"
          fi
          if [[ -z "${tag}" ]]; then
            echo "release tag is required" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "bottle_release_tag=ethernity-${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download uv.lock for selected tag
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${{ steps.meta.outputs.tag }}/uv.lock" \
            -o "${RUNNER_TEMP}/uv.lock"

      - name: Generate source formula from release tag
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate_homebrew_source_formula.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ steps.meta.outputs.tag }}" \
            --template "scripts/homebrew_ethernity_tap.rb" \
            --lock "${RUNNER_TEMP}/uv.lock" \
            --output "${RUNNER_TEMP}/ethernity.rb"

      - name: Resolve tap settings
        id: tap
        shell: bash
        run: |
          set -euo pipefail
          tap_repo="${{ vars.HOMEBREW_TAP_REPO }}"
          if [[ -z "${tap_repo}" ]]; then
            tap_repo="MinorGlitch/homebrew-ethernity"
          fi
          echo "tap_repo=${tap_repo}" >> "${GITHUB_OUTPUT}"

      - name: Verify tap token is configured
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "missing required secret: HOMEBREW_TAP_TOKEN" >&2
            exit 1
          fi

      - name: Checkout tap repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ steps.tap.outputs.tap_repo }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula file
        id: update
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp "${RUNNER_TEMP}/ethernity.rb" tap/Formula/ethernity.rb
          if git -C tap diff --quiet -- Formula/ethernity.rb; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit and push formula update
        if: steps.update.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/ethernity.rb
          git -C tap commit -m "ethernity ${{ steps.meta.outputs.tag }}"
          git -C tap push

  build-bottles:
    if: needs.update-tap.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.build_bottles)
    needs: update-tap
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            id: macos-15-intel
          - runner: macos-14
            id: macos-14
          - runner: ubuntu-24.04
            id: ubuntu-24.04
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ needs.update-tap.outputs.tap_repo }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Configure Homebrew (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "/home/linuxbrew/.linuxbrew/bin" >> "${GITHUB_PATH}"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "${GITHUB_PATH}"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew --version

      - name: Build bottle
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          set -euo pipefail
          tap_name="${{ needs.update-tap.outputs.tap_repo }}"
          formula_ref="${tap_name}/ethernity"
          brew untap "${tap_name}" || true
          brew tap "${tap_name}" "file://${GITHUB_WORKSPACE}/tap"
          brew uninstall --ignore-dependencies "${formula_ref}" || true
          brew install --build-bottle "${formula_ref}"
          out_dir="${RUNNER_TEMP}/bottles"
          mkdir -p "${out_dir}"
          cd "${out_dir}"
          brew bottle --json --no-rebuild "${formula_ref}"
          ls -1 ethernity--*.bottle.*

      - name: Upload bottle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bottles-${{ matrix.id }}
          path: |
            ${{ runner.temp }}/bottles/ethernity--*.bottle.tar.gz
            ${{ runner.temp }}/bottles/ethernity--*.bottle.json
          if-no-files-found: error

  publish-bottles:
    if: needs.update-tap.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.build_bottles)
    needs: [update-tap, build-bottles]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download bottle artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/bottles

      - name: Rename bottles to single-dash convention
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' src; do
            dst="$(dirname "${src}")/ethernity-${src##*ethernity--}"
            mv "${src}" "${dst}"
          done < <(find "${RUNNER_TEMP}/bottles" -type f -name 'ethernity--*.bottle.tar.gz' -print0)

      - name: Checkout tap repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ needs.update-tap.outputs.tap_repo }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Create tap release if missing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          tap_repo="${{ needs.update-tap.outputs.tap_repo }}"
          bottle_release_tag="${{ needs.update-tap.outputs.bottle_release_tag }}"
          if gh release view "${bottle_release_tag}" --repo "${tap_repo}" >/dev/null 2>&1; then
            echo "Release ${bottle_release_tag} already exists in ${tap_repo}"
          else
            gh release create "${bottle_release_tag}" \
              --repo "${tap_repo}" \
              --title "Ethernity bottles ${{ needs.update-tap.outputs.tag }}" \
              --target master \
              --notes "Automated Homebrew bottle assets for ${{ needs.update-tap.outputs.tag }}."
          fi

      - name: Upload bottle assets to tap release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          tap_repo="${{ needs.update-tap.outputs.tap_repo }}"
          bottle_release_tag="${{ needs.update-tap.outputs.bottle_release_tag }}"
          mapfile -t bottle_files < <(find "${RUNNER_TEMP}/bottles" -type f -name 'ethernity-*.bottle.tar.gz' | sort)
          if [[ "${#bottle_files[@]}" -eq 0 ]]; then
            echo "no bottle tarballs found" >&2
            exit 1
          fi
          gh release upload "${bottle_release_tag}" "${bottle_files[@]}" --repo "${tap_repo}" --clobber

      - name: Update bottle block in formula
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t bottle_files < <(find "${RUNNER_TEMP}/bottles" -type f -name 'ethernity-*.bottle.tar.gz' | sort)
          if [[ "${#bottle_files[@]}" -eq 0 ]]; then
            echo "no bottle tarballs found for formula update" >&2
            exit 1
          fi
          bottle_args=()
          for bottle_file in "${bottle_files[@]}"; do
            bottle_args+=(--bottle-file "${bottle_file}")
          done
          python3 scripts/update_homebrew_bottle_block.py \
            --formula "tap/Formula/ethernity.rb" \
            --tap-repo "${{ needs.update-tap.outputs.tap_repo }}" \
            --release-tag "${{ needs.update-tap.outputs.bottle_release_tag }}" \
            "${bottle_args[@]}"

      - name: Commit and push bottle block update
        shell: bash
        run: |
          set -euo pipefail
          if git -C tap diff --quiet -- Formula/ethernity.rb; then
            echo "No bottle block changes to commit."
            exit 0
          fi
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/ethernity.rb
          git -C tap commit -m "ethernity ${{ needs.update-tap.outputs.tag }} bottles"
          git -C tap push

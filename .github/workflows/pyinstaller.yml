name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name for release (required, e.g. v1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}-${{ inputs.release_tag || 'none' }}
  cancel-in-progress: false

jobs:
  precheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Resolve target tag and commit
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "release_tag is required" >&2
            exit 1
          fi
          if [[ ! "${TAG}" =~ ^v ]]; then
            echo "release tag must start with 'v': ${TAG}" >&2
            exit 1
          fi

          git fetch --force --tags origin
          if ! git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "tag not found: ${TAG}" >&2
            exit 1
          fi

          COMMIT_SHA="$(git rev-list -n 1 "refs/tags/${TAG}")"
          if [[ -z "${COMMIT_SHA}" ]]; then
            echo "unable to resolve commit SHA for tag: ${TAG}" >&2
            exit 1
          fi

          export COMMIT_SHA
          PROJECT_VERSION="$(python - <<'PY'
          import os
          import subprocess
          import tomllib

          commit_sha = os.environ["COMMIT_SHA"]
          try:
              raw_pyproject = subprocess.check_output(
                  ["git", "show", f"{commit_sha}:pyproject.toml"],
                  stderr=subprocess.DEVNULL,
              )
          except subprocess.CalledProcessError as exc:
              raise SystemExit(
                  f"unable to read pyproject.toml at commit {commit_sha}"
              ) from exc

          data = tomllib.loads(raw_pyproject.decode("utf-8"))
          print(data["project"]["version"])
          PY
          )"
          EXPECTED_TAG="v${PROJECT_VERSION}"
          if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "release tag/version mismatch: tag='${TAG}', expected='${EXPECTED_TAG}' from pyproject.toml at ${COMMIT_SHA}" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              PRERELEASE=true
            else
              PRERELEASE=false
            fi
            if [[ "${{ inputs.draft }}" == "true" ]]; then
              DRAFT=true
            else
              DRAFT=false
            fi
          else
            if [[ "${TAG}" == *-* ]]; then
              PRERELEASE=true
            else
              PRERELEASE=false
            fi
            DRAFT=false
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "commit_sha=${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"
          echo "draft=${DRAFT}" >> "${GITHUB_OUTPUT}"

      - name: Verify CI succeeded for target commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.meta.outputs.commit_sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import sys
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["TARGET_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          max_wait_seconds = 20 * 60
          poll_seconds = 20
          deadline = time.time() + max_wait_seconds
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          while True:
              query = urllib.parse.urlencode({"head_sha": sha, "per_page": "100"})
              url = f"https://api.github.com/repos/{repo}/actions/workflows/ci.yml/runs?{query}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as response:  # noqa: S310
                  payload = json.load(response)

              runs = payload.get("workflow_runs", [])
              if runs:
                  # Release gating policy: require the latest CI run for this commit SHA
                  # to be green. We intentionally do not allow an older successful run
                  # to satisfy the gate after a newer run fails/cancels.
                  latest = runs[0]
                  latest_status = str(latest.get("status") or "unknown")
                  latest_conclusion = str(latest.get("conclusion") or "unknown")
                  latest_url = str(latest.get("html_url") or "")

                  if latest_status == "completed":
                      if latest_conclusion == "success":
                          print(
                              "Latest CI workflow run succeeded for "
                              f"{sha}: conclusion={latest_conclusion}"
                          )
                          break
                      print(
                          "Latest CI workflow run for target commit completed without success "
                          f"(status={latest_status}, conclusion={latest_conclusion}). "
                          f"Run: {latest_url}",
                          file=sys.stderr,
                      )
                      sys.exit(1)

                  if latest_status not in {
                      "queued",
                      "in_progress",
                      "requested",
                      "waiting",
                      "pending",
                  }:
                      print(
                          "Latest CI workflow run has unexpected status for target commit "
                          f"{sha}: {latest_status}. Run: {latest_url}",
                          file=sys.stderr,
                      )
                      sys.exit(1)

              now = time.time()
              if now >= deadline:
                  state = "no runs found"
                  if runs:
                      latest = runs[0]
                      latest_status = str(latest.get("status") or "unknown")
                      latest_conclusion = str(latest.get("conclusion") or "unknown")
                      state = (
                          "latest run "
                          f"status={latest_status}, conclusion={latest_conclusion}"
                      )
                  print(
                      "Timed out waiting for latest successful CI workflow run for commit "
                      f"{sha} ({state}). Release publishing is blocked.",
                      file=sys.stderr,
                  )
                  sys.exit(1)

              remaining = int(deadline - now)
              print(
                  "Waiting for CI success for commit "
                  f"{sha} ({remaining}s remaining)..."
              )
              time.sleep(poll_seconds)
          PY

  build:
    needs: precheck
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact_os: linux
            artifact_arch: x64
            archive_ext: tar.gz
          - runner: ubuntu-24.04-arm
            artifact_os: linux
            artifact_arch: arm64
            archive_ext: tar.gz
          - runner: macos-15-intel
            artifact_os: macos
            artifact_arch: x64
            archive_ext: tar.gz
          - runner: macos-latest
            artifact_os: macos
            artifact_arch: arm64
            archive_ext: tar.gz
          - runner: windows-latest
            artifact_os: windows
            artifact_arch: x64
            archive_ext: zip
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.precheck.outputs.commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install build dependencies
        run: uv sync --extra build --frozen

      - name: Build with PyInstaller (onedir)
        run: uv run pyinstaller --clean --noconfirm ethernity.spec

      - name: Smoke test built executable
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.artifact_os }}" == "windows" ]]; then
            ./dist/ethernity/ethernity.exe --help >/dev/null
            ./dist/ethernity/ethernity.exe --version
          else
            ./dist/ethernity/ethernity --help >/dev/null
            ./dist/ethernity/ethernity --version
          fi

      - name: Package release archive
        env:
          RELEASE_TAG: ${{ needs.precheck.outputs.tag }}
          ARTIFACT_OS: ${{ matrix.artifact_os }}
          ARTIFACT_ARCH: ${{ matrix.artifact_arch }}
          RUNNER_ARCH: ${{ runner.arch }}
          PACKAGER: pyinstaller
          PACKAGE_MODE: onedir
        run: uv run python scripts/package_pyinstaller.py

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6
        with:
          name: release-build-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          if-no-files-found: error
          path: |
            ethernity-${{ needs.precheck.outputs.tag }}-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}.${{ matrix.archive_ext }}

  provenance:
    needs: [precheck, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.precheck.outputs.commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Download packaged artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: release-build-*
          merge-multiple: true
          path: dist-artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Export locked requirements for SBOM
        run: |
          uv export --format requirements.txt --no-dev --extra build --frozen \
            --no-editable --no-emit-project --no-emit-workspace \
            --output-file dist-artifacts/release-requirements.txt

      - name: Generate SBOMs and sign artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(dist-artifacts/*.zip dist-artifacts/*.tar.gz)
          if (( ${#archives[@]} == 0 )); then
            echo "no archives found to sign" >&2
            exit 1
          fi

          for archive in "${archives[@]}"; do
            if [[ "${archive}" == *.tar.gz ]]; then
              stem="${archive%.tar.gz}"
            else
              stem="${archive%.zip}"
            fi
            sbom="${stem}.sbom.cdx.json"

            uv run --with cyclonedx-bom cyclonedx-py requirements \
              dist-artifacts/release-requirements.txt \
              --pyproject pyproject.toml \
              --output-reproducible \
              --of JSON \
              --output-file "${sbom}"

            # Sign distributable payloads directly.
            for file in "${archive}" "${sbom}"; do
              cosign sign-blob --yes \
                --bundle "${file}.sigstore.json" \
                --output-signature "${file}.sig" \
                --output-certificate "${file}.pem" \
                "${file}"
            done
          done

      - name: Upload provenance artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6
        with:
          name: release-provenance
          if-no-files-found: error
          path: |
            dist-artifacts/*.sbom.cdx.json
            dist-artifacts/*.sigstore.json
            dist-artifacts/*.sig
            dist-artifacts/*.pem

  release:
    needs: [precheck, provenance]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.precheck.result == 'success' && needs.provenance.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: release-*
          merge-multiple: true
          path: dist-artifacts

      - name: Validate release artifact set completeness
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          tag="${{ needs.precheck.outputs.tag }}"
          expected_archives=(
            "dist-artifacts/ethernity-${tag}-linux-x64.tar.gz"
            "dist-artifacts/ethernity-${tag}-linux-arm64.tar.gz"
            "dist-artifacts/ethernity-${tag}-macos-x64.tar.gz"
            "dist-artifacts/ethernity-${tag}-macos-arm64.tar.gz"
            "dist-artifacts/ethernity-${tag}-windows-x64.zip"
          )

          archives=(dist-artifacts/*.zip dist-artifacts/*.tar.gz)
          if (( ${#archives[@]} != ${#expected_archives[@]} )); then
            echo "expected ${#expected_archives[@]} archives, found ${#archives[@]}" >&2
            ls -la dist-artifacts || true
            exit 1
          fi

          for archive in "${expected_archives[@]}"; do
            if [[ ! -f "${archive}" ]]; then
              echo "missing expected archive: ${archive}" >&2
              ls -la dist-artifacts || true
              exit 1
            fi

            if [[ "${archive}" == *.tar.gz ]]; then
              stem="${archive%.tar.gz}"
            else
              stem="${archive%.zip}"
            fi
            sbom="${stem}.sbom.cdx.json"

            required=(
              "${sbom}"
            )
            for file in "${required[@]}"; do
              if [[ ! -f "${file}" ]]; then
                echo "missing required release file: ${file}" >&2
                exit 1
              fi
            done

            signed_targets=("${archive}" "${sbom}")
            for target in "${signed_targets[@]}"; do
              bundle="${target}.sigstore.json"
              if [[ ! -f "${bundle}" ]]; then
                echo "missing required bundle: ${bundle}" >&2
                exit 1
              fi
              sig="${target}.sig"
              cert="${target}.pem"
              if [[ -f "${sig}" || -f "${cert}" ]]; then
                if [[ ! -f "${sig}" || ! -f "${cert}" ]]; then
                  echo "signature/certificate pair incomplete for: ${target}" >&2
                  exit 1
                fi
              fi
            done
          done

      - name: Publish release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ needs.precheck.outputs.tag }}
          prerelease: ${{ needs.precheck.outputs.prerelease == 'true' }}
          draft: ${{ needs.precheck.outputs.draft == 'true' }}
          generate_release_notes: true
          files: |
            dist-artifacts/*.zip
            dist-artifacts/*.tar.gz
            dist-artifacts/*.sbom.cdx.json
            dist-artifacts/*.sigstore.json
            dist-artifacts/*.sig
            dist-artifacts/*.pem

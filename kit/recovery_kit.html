<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ethernity Recovery Kit</title>
  <style>
:root {
  color-scheme: dark;
  --bg: #111;
  --panel: #1a1a1a;
  --panel-2: #161616;
  --ink: #f2f2f2;
  --muted: #b5b5b5;
  --line: #353535;
  --line-2: #4a4a4a;
  --ok: #2ea36f;
  --warn: #c28a2e;
  --err: #c65a5a;
  --accent: #6fa8ff;
  --r: 8px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font: 13px/1.4 system-ui, -apple-system, Segoe UI, sans-serif;
}
h1,h2,h3 { margin: 0; font-weight: 600; }
.shell {
  max-width: 1320px;
  margin: 0 auto;
  padding: 12px;
  display: grid;
  gap: 12px;
}
.app-header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.app-title-block { display: grid; gap: 2px; }
.app-title { font-size: 20px; }
.app-subtitle { margin: 0; color: var(--muted); font-size: 12px; }
.workspace { display: grid; gap: 12px; min-width: 0; }
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 10px;
  display: grid;
  gap: 8px;
}
.card {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 8px;
  display: grid;
  gap: 8px;
}
.row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.row-between { justify-content: space-between; width: 100%; align-items: flex-start; }
.actions-secondary button { padding: 5px 8px; font-size: 11px; }
.step-shell { gap: 8px; }
.step-head { display: grid; gap: 3px; }
.step-heading { font-size: 18px; }
.step-summary { margin: 0; color: var(--muted); font-size: 12px; }
.step-content { display: grid; gap: 8px; }
.step-layout {
  display: grid;
  grid-template-columns: minmax(0,1.1fr) minmax(0,.9fr);
  grid-template-areas: "inputs output" "status output";
  gap: 8px;
  align-items: start;
}
.step-layout.step-layout--status-right { grid-template-areas: "inputs status" "output status"; }
.step-layout.step-layout--compact { grid-template-areas: "inputs status"; }
.step-input { grid-area: inputs; min-width: 0; }
.step-status { grid-area: status; min-width: 0; }
.step-output { grid-area: output; min-width: 0; }
.label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; }
.sub { color: var(--muted); font-size: 12px; }
.hint { color: var(--muted); font-size: 11px; }
.scan-panel {
  display: grid;
  gap: 6px;
  padding: 6px;
  border: 1px dashed var(--line);
  border-radius: 6px;
  background: #141414;
}
.scan-video {
  width: 100%;
  max-height: 220px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #0d0d0d;
  object-fit: cover;
}
.scan-status { white-space: pre-wrap; }
textarea,
input[type="text"],
input[type="password"] {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #121212;
  color: var(--ink);
  padding: 8px;
  font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
textarea { min-height: 96px; resize: vertical; }
.input-collapsed textarea { min-height: 64px; max-height: 96px; }
input[type="password"] { font-family: inherit; }
textarea:focus,
input[type="text"]:focus,
input[type="password"]:focus,
input[type="number"]:focus {
  outline: 2px solid #4f77b8;
  outline-offset: 0;
  border-color: #4f77b8;
}
input[readonly], textarea[readonly] { background: #181818; }
button {
  border: 1px solid var(--line-2);
  border-radius: 6px;
  background: #202020;
  color: var(--ink);
  padding: 7px 10px;
  font: inherit;
  font-weight: 600;
  cursor: pointer;
}
button:hover:not(:disabled) { background: #252525; }
button:focus-visible { outline: 2px solid #4f77b8; outline-offset: 1px; }
button.secondary { background: #1a1a1a; }
button.ghost { background: transparent; }
button:disabled { opacity: .55; cursor: default; }
.success-banner {
  border: 1px solid #2d5c45;
  border-radius: var(--r);
  padding: 10px;
  background: #141b17;
  display: grid;
  gap: 6px;
}
.success-banner h3 { display: flex; align-items: center; gap: 6px; font-size: 14px; }
.success-banner p { margin: 0; color: var(--muted); font-size: 12px; }
.success-icon {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 1px solid #2d5c45;
  display: grid;
  place-items: center;
  font-size: 11px;
}
.status {
  white-space: pre-wrap;
  min-height: 52px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 8px;
  background: #141414;
  font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
.status.ok { border-color: #2d5c45; }
.status.warn { border-color: #6a552a; }
.status.error { border-color: #6d3a3a; }
.diag-list { display: grid; gap: 6px; }
.details { display: grid; gap: 8px; padding-top: 6px; border-top: 1px dashed var(--line); }
.details > summary { cursor: pointer; color: var(--muted); font-size: 11px; }
.diag-row {
  display: grid;
  grid-template-columns: minmax(120px,170px) minmax(0,1fr);
  gap: 8px;
  padding: 7px 8px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--panel-2);
}
.diag-row.ok { border-left: 3px solid var(--ok); }
.diag-row.warn { border-left: 3px solid var(--warn); }
.diag-row.error { border-left: 3px solid var(--err); }
.diag-row.progress { border-left: 3px solid var(--accent); }
.diag-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
.diag-value { display: grid; gap: 3px; min-width: 0; font-size: 12px; }
.diag-value.code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
.diag-main, .diag-detail { white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; }
.diag-detail { color: var(--muted); font-size: 11px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th, td { padding: 6px; border-bottom: 1px solid var(--line); text-align: left; }
thead { color: var(--muted); font-size: 11px; }
.empty-row td { color: var(--muted); font-style: italic; }
@media (max-width: 980px) {
  .step-layout,
  .step-layout.step-layout--status-right {
    grid-template-columns: 1fr;
    grid-template-areas: "inputs" "status" "output";
  }
  .step-layout.step-layout--compact { grid-template-areas: "inputs" "status"; }
}
@media (max-width: 700px) {
  .shell { padding: 10px; }
  .diag-row { grid-template-columns: 1fr; }
}

  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="app/index.jsx"></script>
</body>

</html>

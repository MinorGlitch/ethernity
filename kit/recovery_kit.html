<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ethernity Recovery Kit</title>
  <style>
:root {
  color-scheme: light;
  --bg: #eef2f7;
  --panel: #ffffff;
  --panel-2: #f8fafc;
  --ink: #0f172a;
  --muted: #5b6473;
  --line: #d8e0ea;
  --line-2: #c2ccda;
  --ok: #177a53;
  --warn: #a36412;
  --err: #bb3f3f;
  --accent: #1f5fce;
  --r: 8px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font: 13px/1.45 system-ui, -apple-system, Segoe UI, sans-serif;
}
h1,h2,h3 { margin: 0; font-weight: 600; }
.shell {
  max-width: 1320px;
  margin: 0 auto;
  padding: 16px;
  display: grid;
  gap: 14px;
}
.shell--blocked {
  max-width: none;
  min-height: 100vh;
  margin: 0;
  display: grid;
  place-items: center;
  padding: 20px;
}
.app-header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; padding: 2px 2px 0; }
.app-title-block { display: grid; gap: 3px; }
.app-title { font-size: 21px; letter-spacing: -.025em; line-height: 1.15; }
.app-subtitle { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.35; }
.workspace { display: grid; gap: 14px; min-width: 0; }
.offline-guard-screen {
  width: min(760px, 100%);
  display: grid;
}
.offline-guard-card {
  display: grid;
  gap: 12px;
  padding: 20px;
  border-radius: 14px;
  border: 1px solid #e0c389;
  background: linear-gradient(180deg, #fffdf7 0%, #fffaf0 100%);
  box-shadow:
    0 12px 30px rgba(15, 23, 42, 0.08),
    0 1px 0 rgba(255, 255, 255, 0.8) inset;
}
.offline-guard-kicker {
  color: var(--warn);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.offline-guard-title {
  margin: 0;
  font-size: 28px;
  line-height: 1.05;
  letter-spacing: -0.03em;
}
.offline-guard-subtitle {
  margin: -4px 0 0;
  color: var(--muted);
  font-size: 14px;
}
.offline-guard-status {
  min-height: 0;
  font-size: 13px;
  line-height: 1.5;
  border-width: 1px;
}
.offline-guard-note {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}
.offline-guard-actions {
  display: grid;
  gap: 10px;
  margin-top: 2px;
}
.offline-guard-confirm {
  display: grid;
  gap: 8px;
  padding: 12px;
  border: 1px solid #ead8ab;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.65);
}
.offline-guard-confirm-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--warn);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.offline-guard-confirm-text {
  font-size: 13px;
  line-height: 1.4;
  color: var(--ink);
}
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 12px;
  display: grid;
  gap: 10px;
  box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03);
}
.online-override-banner {
  border-color: #e1a2a2;
  background: linear-gradient(180deg, #fff9f9 0%, #fff3f3 100%);
}
.online-override-banner .row-between { align-items: center; gap: 10px; }
.online-override-banner .sub { max-width: 700px; }
.card {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 10px;
  display: grid;
  gap: 10px;
}
.card > h3 { font-size: 13px; line-height: 1.25; letter-spacing: -.01em; }
.row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.row-between { justify-content: space-between; width: 100%; align-items: flex-start; }
.actions-secondary button { padding: 5px 8px; font-size: 11px; }
.step-shell { gap: 10px; }
.step-head { display: grid; gap: 4px; padding: 1px 0 8px; border-bottom: 1px solid var(--line); }
.step-heading { font-size: 18px; letter-spacing: -.02em; line-height: 1.2; }
.step-summary { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.35; }
.step-content { display: grid; gap: 10px; }
.step-layout {
  display: grid;
  grid-template-columns: minmax(0,1.1fr) minmax(0,.9fr);
  grid-template-areas: "inputs output" "status output";
  gap: 10px;
  align-items: start;
}
.step-layout.step-layout--status-right { grid-template-areas: "inputs status" "output status"; }
.step-layout.step-layout--compact { grid-template-areas: "inputs status"; }
.step-input { grid-area: inputs; min-width: 0; }
.step-status { grid-area: status; min-width: 0; }
.step-output { grid-area: output; min-width: 0; }
.label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; line-height: 1.2; }
.sub { color: var(--muted); font-size: 12px; }
.hint { color: var(--muted); font-size: 11px; line-height: 1.35; }
.scan-panel {
  display: grid;
  gap: 8px;
  padding: 8px;
  border: 1px dashed var(--line);
  border-radius: 6px;
  background: #f6f9fc;
}
.scan-video {
  width: 100%;
  max-height: 220px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #e5ebf3;
  object-fit: cover;
}
.scan-status { white-space: pre-wrap; }
textarea,
input[type="text"],
input[type="password"] {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  color: var(--ink);
  padding: 9px 10px;
  font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
textarea { min-height: 108px; resize: vertical; }
.input-collapsed textarea { min-height: 64px; max-height: 96px; }
input[type="password"] { font-family: inherit; }
textarea:focus,
input[type="text"]:focus,
input[type="password"]:focus,
input[type="number"]:focus {
  outline: 2px solid var(--accent);
  outline-offset: 0;
  border-color: var(--accent);
}
textarea::placeholder,
input[type="text"]::placeholder,
input[type="password"]::placeholder { color: #8a95a6; }
input[readonly], textarea[readonly] { background: #f5f8fc; }
button {
  border: 1px solid var(--line-2);
  border-radius: 6px;
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  padding: 7px 11px;
  font: inherit;
  font-weight: 600;
  line-height: 1.2;
  cursor: pointer;
}
button:hover:not(:disabled) { filter: brightness(0.95); }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
button.secondary {
  background: #fff;
  color: var(--ink);
  border-color: var(--line-2);
}
button.secondary:hover:not(:disabled) { background: #f4f7fb; }
button.ghost {
  background: transparent;
  color: var(--muted);
  border-color: transparent;
}
button.ghost:hover:not(:disabled) { background: #eef3f9; color: var(--ink); }
button:disabled { opacity: .55; cursor: default; }
.success-banner {
  border: 1px solid #a8d3bd;
  border-radius: var(--r);
  padding: 12px;
  background: #eef8f2;
  display: grid;
  gap: 8px;
}
.success-banner h3 { display: flex; align-items: center; gap: 6px; font-size: 14px; }
.success-banner p { margin: 0; color: var(--muted); font-size: 12px; }
.success-icon {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 1px solid #a8d3bd;
  display: grid;
  place-items: center;
  font-size: 11px;
}
.status {
  white-space: pre-wrap;
  min-height: 56px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 10px;
  background: #fff;
  font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
.status.ok { border-color: #9dceb6; background: #f2fbf6; }
.status.warn { border-color: #e0c389; background: #fff9ef; }
.status.error { border-color: #e1a2a2; background: #fff4f4; }
.diag-list { display: grid; gap: 8px; }
.details { display: grid; gap: 10px; padding-top: 8px; border-top: 1px dashed var(--line); }
.details > summary { cursor: pointer; color: var(--muted); font-size: 11px; font-weight: 600; line-height: 1.2; }
.diag-row {
  display: grid;
  grid-template-columns: minmax(120px,170px) minmax(0,1fr);
  gap: 10px;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
}
.diag-row.ok { border-left: 3px solid var(--ok); background: #f5fbf8; }
.diag-row.warn { border-left: 3px solid var(--warn); background: #fffaf1; }
.diag-row.error { border-left: 3px solid var(--err); background: #fff5f5; }
.diag-row.progress { border-left: 3px solid var(--accent); background: #f4f8ff; }
.diag-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; line-height: 1.2; }
.diag-value { display: grid; gap: 4px; min-width: 0; font-size: 12px; line-height: 1.35; }
.diag-value.code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
.diag-main, .diag-detail { white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; }
.diag-detail { color: var(--muted); font-size: 11px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th, td { padding: 8px 6px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
thead { color: var(--muted); font-size: 11px; }
.empty-row td { color: var(--muted); font-style: italic; }
@media (max-width: 980px) {
  .step-layout,
  .step-layout.step-layout--status-right {
    grid-template-columns: 1fr;
    grid-template-areas: "inputs" "status" "output";
  }
  .step-layout.step-layout--compact { grid-template-areas: "inputs" "status"; }
}
@media (max-width: 700px) {
  .shell { padding: 10px; gap: 12px; }
  .shell--blocked { padding: 12px; }
  .offline-guard-card { padding: 14px; gap: 10px; border-radius: 10px; }
  .offline-guard-title { font-size: 22px; }
  .offline-guard-subtitle { font-size: 13px; }
  .offline-guard-confirm { padding: 10px; }
  .diag-row { grid-template-columns: 1fr; }
}

  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="app/index.jsx"></script>
</body>

</html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ethernity Recovery Kit</title>
  <style>
:root {
  color-scheme: light;

  /* ── Surfaces ── */
  --bg: #eef2f7;
  --surface: #ffffff;
  --surface-alt: #f5f8fc;

  /* ── Text ── */
  --ink: #0f172a;
  --muted: #5b6473;
  --placeholder: #8a95a6;

  /* ── Borders ── */
  --line: #d8e0ea;

  /* ── Accent ── */
  --accent: #1f5fce;

  /* ── Status ── */
  --ok: #177a53;
  --ok-bg: #f2fbf6;
  --ok-border: #9dceb6;

  --warn: #a36412;
  --warn-bg: #fff9ef;
  --warn-border: #e0c389;

  --err: #bb3f3f;
  --err-bg: #fff4f4;
  --err-border: #e1a2a2;

  /* ── Guard (online warning) ── */
  --guard-border: #e1a2a2;
  --guard-bg: #fff9f9;

  /* ── Disabled ── */
  --disabled-bg: #c5d0e0;
  --disabled-text: #5a6a82;
  --disabled-secondary-bg: #e8ecf2;
  --disabled-secondary-text: #7a8594;
  --disabled-secondary-border: #d0d7e2;
  --disabled-ghost-text: #7b8698;

  /* ── Hover ── */
  --secondary-hover-bg: #f4f7fb;
  --ghost-hover-bg: #eef3f9;

  /* ── Scan ── */
  --scan-video-bg: #e5ebf3;

  /* ── Guard ── */
  --guard-confirm-border: #efc0c0;
  --guard-confirm-bg: rgba(255, 255, 255, 0.7);

  /* ── Spacing ── */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;

  /* ── Border radius ── */
  --r-sm: 6px;
  --r: 8px;

  /* ── Typography ── */
  --font-body: system-ui, -apple-system, Segoe UI, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --fs-xs: 10px;
  --fs-sm: 11px;
  --fs-base: 12px;
  --fs-md: 14px;
  --fs-lg: 15px;
  --fs-xl: 24px;
  --fs-2xl: 36px;
  --fs-3xl: 40px;
  --lh-tight: 1.1;
  --lh-snug: 1.2;
  --lh-normal: 1.35;
  --lh-relaxed: 1.5;
  --ls-wide: 0.1em;
  --ls-tight: -0.03em;

  /* ── Motion ── */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);

  /* ── Shadows ── */
  --shadow-md: 0 2px 8px rgba(15, 23, 42, 0.06), 0 1px 0 rgba(15, 23, 42, 0.03);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font: var(--fs-md)/var(--lh-relaxed) var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
h1,h2,h3 { margin: 0; font-weight: 700; }

/* ── Layout ── */
.shell {
  max-width: 1320px;
  margin: 0 auto;
  padding: var(--sp-5) var(--sp-6);
  display: grid;
  gap: var(--sp-6);
}
.shell--blocked {
  max-width: none;
  min-height: 100vh;
  margin: 0;
  display: grid;
  place-items: center;
  padding: var(--sp-5);
}

/* ── Header ── */
.app-header { display: flex; align-items: baseline; justify-content: space-between; gap: var(--sp-2); padding: var(--sp-2) 0 var(--sp-1); }
.app-title-block { display: grid; gap: var(--sp-1); }
.app-title { font-size: var(--fs-2xl); letter-spacing: var(--ls-tight); line-height: var(--lh-tight); font-weight: 800; }
.app-subtitle { margin: 0; color: var(--muted); font-size: var(--fs-lg); line-height: var(--lh-normal); overflow-wrap: break-word; letter-spacing: -0.01em; }
.workspace { display: grid; gap: var(--sp-6); min-width: 0; }

/* ── Offline guard ── */
.offline-guard-screen {
  width: min(760px, 100%);
  display: grid;
}
.offline-guard-card {
  display: grid;
  gap: var(--sp-3);
  padding: var(--sp-5);
  border-radius: var(--r);
  border: 1px solid var(--guard-border);
  background: var(--guard-bg);
  box-shadow: var(--shadow-md);
}
.offline-guard-kicker {
  color: var(--err);
  font-size: var(--fs-sm);
  font-weight: 700;
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
}
.offline-guard-title {
  margin: 0;
  font-size: var(--fs-3xl);
  line-height: var(--lh-tight);
  letter-spacing: var(--ls-tight);
  font-weight: 800;
}
.offline-guard-subtitle {
  margin: calc(-1 * var(--sp-1)) 0 0;
  color: var(--muted);
  font-size: var(--fs-lg);
}
.offline-guard-status {
  min-height: 0;
  font-size: var(--fs-md);
  line-height: 1.5;
  border-width: 1px;
}
.offline-guard-status.status.warn {
  border-color: var(--err-border);
  background: var(--err-bg);
}
.offline-guard-note {
  color: var(--muted);
  font-size: var(--fs-base);
  line-height: var(--lh-normal);
}
.offline-guard-actions {
  display: grid;
  gap: var(--sp-3);
  margin-top: var(--sp-1);
}
.offline-guard-confirm {
  display: grid;
  gap: var(--sp-2);
  padding: var(--sp-3);
  border: 1px solid var(--guard-confirm-border);
  border-radius: var(--r);
  background: var(--guard-confirm-bg);
}
.offline-guard-confirm-title {
  font-size: var(--fs-base);
  font-weight: 700;
  color: var(--err);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
}
.offline-guard-confirm-text {
  font-size: var(--fs-md);
  line-height: var(--lh-normal);
  color: var(--ink);
}

/* ── Panel ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: var(--sp-4);
  display: grid;
  gap: var(--sp-3);
  box-shadow: var(--shadow-md);
}
.online-override-banner {
  border-color: var(--err-border);
  background: var(--err-bg);
}
.online-override-banner .row-between { align-items: center; gap: var(--sp-3); }
.online-override-banner .sub { max-width: 700px; }

/* ── Layout helpers ── */
.row { display: flex; flex-wrap: wrap; align-items: center; gap: var(--sp-2); min-width: 0; }
.row-between { justify-content: space-between; width: 100%; align-items: flex-start; }
.actions-secondary { gap: var(--sp-1); }
.actions-secondary button { padding: var(--sp-1) var(--sp-2); font-size: var(--fs-sm); }

/* ── Steps ── */
.step-shell {
  gap: var(--sp-3);
  animation: step-enter 500ms var(--ease-out) both;
}
.step-shell:nth-child(1) { animation-delay: 80ms; }
.step-shell:nth-child(2) { animation-delay: 180ms; }
.step-shell:nth-child(3) { animation-delay: 280ms; }
.step-head { display: grid; gap: var(--sp-2); padding: 0 0 var(--sp-3); border-bottom: 2px solid var(--line); }
.step-heading {
  font-size: var(--fs-xl);
  letter-spacing: var(--ls-tight);
  line-height: var(--lh-tight);
  font-weight: 800;
}
.step-summary { margin: 0; color: var(--muted); font-size: var(--fs-md); line-height: var(--lh-normal); overflow-wrap: break-word; }
.step-content { display: grid; gap: var(--sp-3); }
.step-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 0.85fr);
  gap: var(--sp-4);
  align-items: start;
}
.step-section { display: grid; gap: var(--sp-3); min-width: 0; }
.step-section-label {
  font-size: var(--fs-sm);
  line-height: var(--lh-snug);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  font-weight: 700;
  color: var(--muted);
}

/* ── Text helpers ── */
.label { color: var(--muted); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: var(--ls-wide); font-weight: 700; line-height: var(--lh-snug); }
.sub { color: var(--muted); font-size: var(--fs-md); overflow-wrap: break-word; }
.hint { color: var(--muted); font-size: var(--fs-sm); line-height: var(--lh-normal); overflow-wrap: break-word; }

/* ── Scanner ── */
.scan-panel {
  display: grid;
  gap: var(--sp-2);
  padding: var(--sp-2);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--surface-alt);
}
.scan-video {
  width: 100%;
  max-height: 340px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: #e5ebf3;
  object-fit: contain;
}
.scan-preview {
  position: relative;
  display: grid;
}
.scan-box {
  position: absolute;
  top: 50%;
  left: 50%;
  width: min(68%, 280px);
  aspect-ratio: 1;
  transform: translate(-50%, -50%);
  border: 2px solid rgba(31, 95, 206, 0.95);
  border-radius: var(--r);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.75),
    0 0 0 9999px rgba(15, 23, 42, 0.1) inset;
  pointer-events: none;
}
.scan-status { white-space: pre-wrap; }

/* ── Form inputs ── */
textarea,
input[type="text"],
input[type="password"] {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--surface);
  color: var(--ink);
  padding: 10px 12px;
  font: var(--fs-base)/var(--lh-relaxed) var(--font-mono);
  transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
}
textarea {
  min-height: 120px;
  resize: vertical;
  overflow-wrap: anywhere;
}
.input-collapsed textarea { min-height: 64px; max-height: 96px; }
input[type="password"] { font-family: inherit; }
textarea:focus,
input[type="text"]:focus,
input[type="password"]:focus,
input[type="number"]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(31, 95, 206, 0.15);
}
textarea::placeholder,
input[type="text"]::placeholder,
input[type="password"]::placeholder { color: var(--placeholder); }
input[readonly], textarea[readonly] { background: var(--surface-alt); }

/* ── Buttons ── */
button {
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  padding: var(--sp-2) var(--sp-4);
  font: inherit;
  font-weight: 700;
  font-size: var(--fs-md);
  line-height: var(--lh-snug);
  cursor: pointer;
  transition: transform 100ms var(--ease-out), filter 100ms var(--ease-out), background 150ms var(--ease-out), color 150ms var(--ease-out), border-color 150ms var(--ease-out);
}
button:active:not(:disabled) { transform: scale(0.97); }
button:hover:not(:disabled) { filter: brightness(0.92); }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
button.secondary {
  background: var(--surface);
  color: var(--ink);
  border-color: var(--line);
}
button.secondary:hover:not(:disabled) { background: #f4f7fb; border-color: var(--accent); color: var(--accent); }
button.ghost {
  background: transparent;
  color: var(--muted);
  border-color: transparent;
}
button.ghost:hover:not(:disabled) { background: #eef3f9; color: var(--ink); }
button:disabled {
  cursor: default;
  background: var(--disabled-bg);
  border-color: var(--disabled-bg);
  color: var(--disabled-text);
}
button:disabled.secondary {
  background: var(--disabled-secondary-bg);
  color: var(--disabled-secondary-text);
  border-color: var(--disabled-secondary-border);
}
button:disabled.ghost {
  background: transparent;
  color: var(--disabled-ghost-text);
  border-color: transparent;
}

/* ── Success banner ── */
.success-banner {
  border: 2px solid var(--ok-border);
  border-radius: var(--r);
  padding: var(--sp-4);
  background: var(--ok-bg);
  display: grid;
  gap: var(--sp-2);
}
.success-banner h3 { display: flex; align-items: center; gap: var(--sp-2); font-size: var(--fs-lg); font-weight: 700; }
.success-banner p { margin: 0; color: var(--muted); font-size: var(--fs-md); }
.success-icon {
  width: 22px;
  height: 22px;
  border-radius: 999px;
  border: 2px solid var(--ok-border);
  display: grid;
  place-items: center;
  font-size: var(--fs-base);
  color: var(--ok);
  font-weight: 700;
}

/* ── Status & Diagnostics ── */
.status {
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
  min-height: 56px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: var(--sp-3);
  background: var(--surface);
  font: var(--fs-base)/var(--lh-relaxed) var(--font-mono);
  transition: border-color 200ms var(--ease-out), background 200ms var(--ease-out);
}
.status.ok { border-color: var(--ok-border); background: var(--ok-bg); }
.status.warn { border-color: var(--warn-border); background: var(--warn-bg); }
.status.error { border-color: var(--err-border); background: var(--err-bg); }
.diag-list { display: grid; gap: var(--sp-1); }
.details { display: grid; gap: var(--sp-3); padding-top: var(--sp-2); border-top: 1px dashed var(--line); }
.details > summary { cursor: pointer; color: var(--muted); font-size: var(--fs-sm); font-weight: 600; line-height: var(--lh-snug); }
.diag-row {
  display: flex;
  align-items: baseline;
  gap: var(--sp-2);
  padding: var(--sp-1) 0;
  border-left: 2px solid var(--line);
  padding-left: var(--sp-2);
}
.diag-row.ok { border-left-color: var(--ok); }
.diag-row.warn { border-left-color: var(--warn); }
.diag-row.error { border-left-color: var(--err); }
.diag-row.progress { border-left-color: var(--accent); }
.diag-label { color: var(--muted); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: var(--ls-wide); font-weight: 700; line-height: var(--lh-snug); white-space: nowrap; }
.diag-value { font-size: var(--fs-base); line-height: var(--lh-normal); overflow-wrap: anywhere; word-break: break-word; min-width: 0; font-family: var(--font-mono); }
.diag-detail { color: var(--muted); font-size: var(--fs-sm); }

/* ── Tables ── */
table { width: 100%; border-collapse: collapse; font-size: var(--fs-base); table-layout: fixed; }
th, td { padding: var(--sp-2) var(--sp-1); border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; overflow-wrap: anywhere; word-break: break-word; }
thead { color: var(--muted); font-size: var(--fs-sm); }
.empty-row td { color: var(--muted); font-style: italic; }

/* ── Responsive ── */
@media (max-width: 980px) {
  .step-layout { grid-template-columns: 1fr; }
}

/* ── Motion ── */
@keyframes step-enter {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="app/index.jsx"></script>
</body>
